name: SynapseWork
options:
  bundleIdPrefix: tech.synapse.work
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

packages:
  SynapseWorkKit:
    path: packages/SynapseWorkKit

targets:
  SynapseWorkiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - apps/SynapseWork-iOS
      - apps/Shared
    dependencies:
      - package: SynapseWorkKit
        product: Models
      - package: SynapseWorkKit
        product: Networking
      - package: SynapseWorkKit
        product: Auth
      - package: SynapseWorkKit
        product: Persistence
      - package: SynapseWorkKit
        product: DesignSystem
      - package: SynapseWorkKit
        product: Features
      - package: SynapseWorkKit
        product: AppLifecycle
    info:
      path: apps/SynapseWork-iOS/Info.plist
      properties:
        UIBackgroundModes: [fetch, processing, remote-notification]
        BGTaskSchedulerPermittedIdentifiers: [tech.synapse.work.refresh]
        LSApplicationCategoryType: public.app-category.productivity
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        UIUserInterfaceStyle: Dark
    settings:
      base:
        PRODUCT_NAME: SynapseWork
        PRODUCT_BUNDLE_IDENTIFIER: tech.synapse.work.ios
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: apps/SynapseWork-iOS/SynapseWork-iOS.entitlements
        DEVELOPMENT_TEAM: WCGJPF9TWU
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSHumanReadableCopyright: "(c) 2026 Antonio Mastropaolo"
        INFOPLIST_KEY_CFBundleDisplayName: Synapse Work
        INFOPLIST_KEY_CFBundleName: SynapseWork
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SynapseWorkMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - apps/SynapseWork-macOS
      - apps/Shared
    dependencies:
      - package: SynapseWorkKit
        product: Models
      - package: SynapseWorkKit
        product: Networking
      - package: SynapseWorkKit
        product: Auth
      - package: SynapseWorkKit
        product: Persistence
      - package: SynapseWorkKit
        product: DesignSystem
      - package: SynapseWorkKit
        product: Features
      - package: SynapseWorkKit
        product: AppLifecycle
    info:
      path: apps/SynapseWork-macOS/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "(c) 2026 Antonio Mastropaolo"
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: SynapseWork
        PRODUCT_BUNDLE_IDENTIFIER: tech.synapse.work.mac
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: apps/SynapseWork-macOS/SynapseWork-macOS.entitlements
        DEVELOPMENT_TEAM: WCGJPF9TWU
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSHumanReadableCopyright: "(c) 2026 Antonio Mastropaolo"
        INFOPLIST_KEY_CFBundleDisplayName: Synapse Work
        INFOPLIST_KEY_CFBundleName: SynapseWork
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
