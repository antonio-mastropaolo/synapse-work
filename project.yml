name: SynapseWork
options:
  bundleIdPrefix: tech.synapse.work
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"

packages:
  SynapseWorkKit:
    path: packages/SynapseWorkKit

targets:
  SynapseWorkiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - apps/SynapseWork-iOS
    dependencies:
      - package: SynapseWorkKit
        product: WorkCore
      - package: SynapseWorkKit
        product: WorkUI
      - package: SynapseWorkKit
        product: WorkRepositories
      - package: SynapseWorkKit
        product: WorkFeatures
    info:
      path: apps/SynapseWork-iOS/Info.plist
      properties:
        UIBackgroundModes: [fetch, processing, remote-notification]
        BGTaskSchedulerPermittedIdentifiers: [tech.synapse.work.refresh]
        LSApplicationCategoryType: public.app-category.productivity
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        UIUserInterfaceStyle: Dark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.synapse.work.ios
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: apps/SynapseWork-iOS/SynapseWork-iOS.entitlements
        DEVELOPMENT_TEAM: WCGJPF9TWU
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSHumanReadableCopyright: "(c) 2026 Antonio Mastropaolo"
        INFOPLIST_KEY_CFBundleDisplayName: Synapse Work
        INFOPLIST_KEY_CFBundleName: SynapseWork
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
